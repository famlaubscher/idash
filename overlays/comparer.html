<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none';
               script-src 'self' 'unsafe-inline';
               style-src 'self' 'unsafe-inline';
               img-src 'self' data:;
               font-src 'self';
               connect-src 'self' https://api.anthropic.com;
               base-uri 'none';
               form-action 'none';
               object-src 'none'">
<title>iRacing Setup Comparer</title>
<style>
  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --text: #e6edf3; --text-dim: #8b949e;
    --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
    --font: system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; gap: 20px; flex-shrink: 0; }
  header h1 { font-size: 15px; font-weight: 700; }
  .meta { font-size: 11px; color: var(--text-dim); }
  .meta span { color: var(--text); font-weight: 600; }

  .panels { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }

  .panel { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
  .panel:last-child { border-right: none; }

  .panel-header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 8px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .panel-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .label-a { color: var(--accent); }
  .label-b { color: var(--green); }
  .panel-filename { font-size: 11px; color: var(--text-dim); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-clear { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
  .btn-clear:hover { color: var(--text); }

  .drop-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; border: 2px dashed var(--border); margin: 12px; border-radius: 10px; cursor: pointer; transition: all .15s; color: var(--text-dim); }
  .drop-zone:hover, .drop-zone.over { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,.04); }
  .drop-zone.over-b { border-color: var(--green); color: var(--green); background: rgba(63,185,80,.04); }
  .drop-zone svg { width: 36px; height: 36px; opacity: .4; }
  .drop-zone p { font-size: 13px; }
  .drop-zone small { font-size: 11px; opacity: .6; }

  .setup-content { flex: 1; overflow-y: auto; display: none; }

  .sec-header { background: var(--bg3); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 4px 14px; font-size: 10px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--text-dim); }
  .sec-header:first-child { border-top: none; }

  .param { display: flex; justify-content: space-between; align-items: center; padding: 4px 14px; border-bottom: 1px solid rgba(48,54,61,.4); gap: 8px; }
  .param:hover { background: rgba(255,255,255,.025); }
  .param-name { color: var(--text-dim); flex: 1; }
  .param-val { font-weight: 600; text-align: right; white-space: nowrap; }
  .diff-a .param-val { color: var(--accent); background: rgba(88,166,255,.13); padding: 1px 6px; border-radius: 4px; }
  .diff-b .param-val { color: var(--green); background: rgba(63,185,80,.13); padding: 1px 6px; border-radius: 4px; }

  .bottom { background: var(--bg2); border-top: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; font-size: 12px; color: var(--text-dim); }
  .diff-badge { background: var(--yellow); color: #000; font-weight: 700; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .api-input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 10px; border-radius: 6px; font-size: 12px; width: 240px; font-family: monospace; }
  .api-input::placeholder { color: var(--text-dim); }
  .btn-ai { background: linear-gradient(135deg,#7c3aed,#4f46e5); border: none; color: #fff; padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .btn-ai:disabled { opacity: .4; cursor: not-allowed; }
  .btn-ai:hover:not(:disabled) { opacity: .85; }

  #ai-panel { position: fixed; right: 0; top: 45px; bottom: 41px; width: 400px; background: var(--bg2); border-left: 1px solid var(--border); transform: translateX(100%); transition: transform .25s ease; display: flex; flex-direction: column; z-index: 50; }
  #ai-panel.open { transform: translateX(0); }
  .panels.ai-open { grid-template-columns: 1fr 1fr; margin-right: 400px; }
  .ai-head { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .ai-head h2 { font-size: 13px; font-weight: 700; flex: 1; }
  .btn-close { background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; line-height: 1; }
  .btn-close:hover { color: var(--text); }
  .ai-body { flex: 1; overflow-y: auto; padding: 14px; line-height: 1.65; font-size: 13px; }
  .ai-body h3 { color: var(--accent); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; margin: 14px 0 5px; }
  .ai-body p { margin-bottom: 9px; }
  .ai-body ul { padding-left: 16px; margin-bottom: 9px; }
  .ai-body li { margin-bottom: 4px; }
  .ai-body strong { color: var(--text); }
  .ai-loading { display: flex; align-items: center; gap: 10px; color: var(--text-dim); padding: 16px 0; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .ai-body table { width: 100%; border-collapse: collapse; margin: 8px 0 12px; font-size: 12px; }
  .ai-body th { background: var(--bg3); color: var(--text-dim); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: .4px; padding: 5px 8px; border: 1px solid var(--border); text-align: left; }
  .ai-body td { padding: 5px 8px; border: 1px solid var(--border); vertical-align: top; }
  .ai-body tr:nth-child(even) td { background: rgba(255,255,255,.02); }
  .ai-body code { background: var(--bg3); padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 11px; }
  .ai-body hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .ai-body .spacer { height: 6px; }
  .ai-body .fazit { background: rgba(88,166,255,.08); border-left: 3px solid var(--accent); padding: 7px 10px; border-radius: 0 6px 6px 0; margin: 8px 0; font-size: 12px; color: var(--text); }
  .ai-body em { color: var(--text-dim); font-style: normal; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>⚙ Setup Comparer</h1>
  <div class="meta" id="meta-a">Setup A: <span>—</span></div>
  <div class="meta">vs</div>
  <div class="meta" id="meta-b">Setup B: <span>—</span></div>
</header>

<div class="panels" id="panels">
  <!-- Panel A -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label label-a">A</span>
      <span class="panel-filename" id="fname-a">Keine Datei</span>
      <button class="btn-clear" id="clear-a" style="display:none" onclick="clearSide('a')" title="Entfernen">✕</button>
    </div>
    <div class="drop-zone" id="drop-a">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
      <p>HTM-Datei hier ablegen</p>
      <small>oder klicken zum Auswählen</small>
    </div>
    <div class="setup-content" id="content-a"></div>
  </div>

  <!-- Panel B -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-label label-b">B</span>
      <span class="panel-filename" id="fname-b">Keine Datei</span>
      <button class="btn-clear" id="clear-b" style="display:none" onclick="clearSide('b')" title="Entfernen">✕</button>
    </div>
    <div class="drop-zone" id="drop-b">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
      <p>HTM-Datei hier ablegen</p>
      <small>oder klicken zum Auswählen</small>
    </div>
    <div class="setup-content" id="content-b"></div>
  </div>
</div>

<div class="bottom" id="bottom-bar">
  <span id="diff-info">Lade zwei Setups um Unterschiede zu sehen</span>
  <input class="api-input" id="api-key" type="password" placeholder="Anthropic API Key (sk-ant-…)" />
  <button class="btn-ai" id="btn-ai" disabled onclick="analyze()">✦ KI-Analyse</button>
</div>

<div id="ai-panel">
  <div class="ai-head">
    <h2>✦ KI-Analyse</h2>
    <button class="btn-close" onclick="closeAI()">✕</button>
  </div>
  <div class="ai-body" id="ai-body"></div>
</div>

<input type="file" id="file-input" accept=".htm,.html" style="display:none">

<script>
  let setupA = null, setupB = null, activeTarget = null;

  // ── File input ────────────────────────────────────────────
  ['a','b'].forEach(side => {
    const zone = document.getElementById('drop-' + side);
    zone.addEventListener('click', () => { activeTarget = side; document.getElementById('file-input').click(); });
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add(side === 'b' ? 'over-b' : 'over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('over','over-b'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('over','over-b');
      const file = e.dataTransfer.files[0];
      if (file) readFile(side, file);
    });
  });

  document.getElementById('file-input').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file && activeTarget) readFile(activeTarget, file);
    e.target.value = '';
  });

  function readFile(side, file) {
    const reader = new FileReader();
    reader.onload = e => {
      const setup = parseSetup(e.target.result);
      if (side === 'a') setupA = setup; else setupB = setup;
      document.getElementById('fname-' + side).textContent = file.name;
      document.getElementById('clear-' + side).style.display = '';
      document.getElementById('drop-' + side).style.display = 'none';
      document.getElementById('content-' + side).style.display = 'block';
      const meta = setup.meta;
      document.getElementById('meta-' + side).innerHTML =
        `Setup ${esc(side.toUpperCase())}: <span>${esc(meta.setup || file.name)}</span>${meta.track ? ' · ' + esc(meta.track) : ''}`;
      render();
    };
    reader.readAsText(file, 'utf-8');
  }

  function clearSide(side) {
    if (side === 'a') setupA = null; else setupB = null;
    document.getElementById('fname-' + side).textContent = 'Keine Datei';
    document.getElementById('clear-' + side).style.display = 'none';
    document.getElementById('drop-' + side).style.display = '';
    document.getElementById('content-' + side).style.display = 'none';
    document.getElementById('meta-' + side).innerHTML = `Setup ${side.toUpperCase()}: <span>—</span>`;
    render();
  }

  // ── Parser ────────────────────────────────────────────────
  function parseSetup(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    const result = { meta: {}, sections: [] };

    const title = doc.querySelector('H2');
    if (title) {
      const m = title.textContent.match(/(\S+)\s+setup:\s*(\S+)[\s\S]*?track:\s*(.+)/i);
      if (m) { result.meta.car = m[1]; result.meta.setup = m[2]; result.meta.track = m[3].trim(); }
    }

    doc.querySelectorAll('H2').forEach(h2 => {
      const name = h2.textContent.replace(/:/g,'').trim();
      if (!name || name.startsWith('iRacing') || name === 'Notes') return;

      let html = '';
      let n = h2.nextSibling;
      while (n && !(n.nodeType===1 && n.tagName?.toUpperCase()==='H2')) {
        html += n.outerHTML || n.textContent || '';
        n = n.nextSibling;
      }

      const params = [];
      const re = /([^<:\n]+):<U>([^<]*)<\/U>/gi;
      let m;
      while ((m = re.exec(html)) !== null) {
        const k = m[1].trim(), v = m[2].trim();
        if (k && v) params.push({ key: k, value: v });
      }
      if (params.length) result.sections.push({ name, params });
    });

    return result;
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    if (!setupA && !setupB) {
      document.getElementById('diff-info').textContent = 'Lade zwei Setups um Unterschiede zu sehen';
      return;
    }

    const map = new Map();
    [[setupA,'a'],[setupB,'b']].forEach(([s,side]) => {
      if (!s) return;
      s.sections.forEach(sec => {
        if (!map.has(sec.name)) map.set(sec.name, {a:[],b:[]});
        map.get(sec.name)[side] = sec.params;
      });
    });

    let diffs = 0, hA = '', hB = '';
    map.forEach((data, secName) => {
      const pA = Object.fromEntries((data.a||[]).map(p=>[p.key,p.value]));
      const pB = Object.fromEntries((data.b||[]).map(p=>[p.key,p.value]));
      const keys = [...new Set([...Object.keys(pA),...Object.keys(pB)])];
      let sA = '', sB = '';
      keys.forEach(k => {
        const va = pA[k]||'', vb = pB[k]||'';
        const diff = va !== vb && (va||vb);
        if (diff) diffs++;
        sA += `<div class="param${diff?' diff-a':''}"><span class="param-name">${esc(k)}</span><span class="param-val">${esc(va||'—')}</span></div>`;
        sB += `<div class="param${diff?' diff-b':''}"><span class="param-name">${esc(k)}</span><span class="param-val">${esc(vb||'—')}</span></div>`;
      });
      hA += `<div class="sec-header">${esc(secName)}</div>${sA}`;
      hB += `<div class="sec-header">${esc(secName)}</div>${sB}`;
    });

    if (setupA) document.getElementById('content-a').innerHTML = hA;
    if (setupB) document.getElementById('content-b').innerHTML = hB;

    const info = document.getElementById('diff-info');
    if (setupA && setupB) {
      info.innerHTML = diffs === 0
        ? 'Setups sind <strong>identisch</strong>'
        : `<span class="diff-badge">${diffs}</span> Unterschied${diffs!==1?'e':''}`;
    } else {
      info.textContent = 'Zweites Setup laden um zu vergleichen';
    }

    syncScroll();
    updateAnalyzeBtn();
  }

  function syncScroll() {
    const a = document.getElementById('content-a');
    const b = document.getElementById('content-b');
    let lock = false;
    a.onscroll = () => { if(!lock){lock=true; b.scrollTop=a.scrollTop; setTimeout(()=>lock=false,0);} };
    b.onscroll = () => { if(!lock){lock=true; a.scrollTop=b.scrollTop; setTimeout(()=>lock=false,0);} };
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ── API Key aus localStorage ──────────────────────────────
  const savedKey = localStorage.getItem('anthropic_key');
  if (savedKey) document.getElementById('api-key').value = savedKey;
  document.getElementById('api-key').addEventListener('change', e => {
    localStorage.setItem('anthropic_key', e.target.value);
  });

  // ── KI-Analyse ────────────────────────────────────────────
  function updateAnalyzeBtn() {
    const hasBoth = setupA && setupB;
    document.getElementById('btn-ai').disabled = !hasBoth;
  }

  async function analyze() {
    const apiKey = document.getElementById('api-key').value.trim();
    if (!apiKey) { alert('Bitte Anthropic API Key eingeben.'); return; }
    if (!setupA || !setupB) return;

    document.getElementById('ai-panel').classList.add('open');
    document.getElementById('panels').classList.add('ai-open');
    document.getElementById('ai-body').innerHTML = '<div class="ai-loading"><div class="spinner"></div>Analysiere Setup-Unterschiede…</div>';
    document.getElementById('btn-ai').disabled = true;

    // Unterschiede sammeln
    const diffs = [];
    const map = new Map();
    [[setupA,'a'],[setupB,'b']].forEach(([s,side]) => {
      if (!s) return;
      s.sections.forEach(sec => {
        if (!map.has(sec.name)) map.set(sec.name,{a:[],b:[]});
        map.get(sec.name)[side] = sec.params;
      });
    });
    map.forEach((data, secName) => {
      const pA = Object.fromEntries((data.a||[]).map(p=>[p.key,p.value]));
      const pB = Object.fromEntries((data.b||[]).map(p=>[p.key,p.value]));
      [...new Set([...Object.keys(pA),...Object.keys(pB)])].forEach(k => {
        const va = pA[k]||'—', vb = pB[k]||'—';
        if (va !== vb) diffs.push(`[${secName}] ${k}: "${va}" → "${vb}"`);
      });
    });

    const nameA = setupA.meta.setup || 'A';
    const nameB = setupB.meta.setup || 'B';

    const prompt = `Du bist ein erfahrener iRacing-Coach und Setup-Experte.

Fahrzeug: ${setupA.meta.car||'?'} | Strecke: ${setupA.meta.track||'?'}
Setup A: "${nameA}" vs Setup B: "${nameB}"

Unterschiede (Format: [Sektion] Parameter: "Wert A" → "Wert B"):
${diffs.map(d=>'• '+d).join('\n')}

Analysiere auf Deutsch, kompakt und praxisnah.

Strukturiere die Antwort nach Sektionen (z.B. Fahrwerk, Dämpfer, Aerodynamik).
Für jede Sektion eine Tabelle mit genau diesen 4 Spalten:
| Parameter | ${nameA} | ${nameB} | Wirkung |

- Spalte "${nameA}": der Wert aus Setup A
- Spalte "${nameB}": der Wert aus Setup B
- Spalte "Wirkung": kurze Erklärung was diese Änderung bewirkt

Nach jeder Tabelle ein > Fazit: ... (eine Zeile was das für das Fahrverhalten bedeutet)

Am Ende: kurze Gesamtempfehlung welches Setup für welche Situation besser geeignet ist.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1500,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error?.message || `HTTP ${res.status}`);
      const text = (await res.json()).content?.[0]?.text || '';
      document.getElementById('ai-body').innerHTML = formatAI(text);
    } catch(e) {
      document.getElementById('ai-body').innerHTML = `<p style="color:#f85149">Fehler: ${esc(e.message)}</p>`;
    } finally {
      document.getElementById('btn-ai').disabled = false;
    }
  }

  function formatAI(t) {
    const lines = t.split('\n');
    let html = '', inUl = false, inTable = false, tableRows = [];

    const flushTable = () => {
      if (!tableRows.length) return;
      let th = '', tbody = '';
      tableRows.forEach((row, i) => {
        const cells = row.split('|').map(c => c.trim()).filter((_,j,a) => j>0 && j<a.length-1);
        if (i === 0) th = cells.map(c=>`<th>${md(c)}</th>`).join('');
        else if (i === 1) return; // separator row
        else tbody += '<tr>' + cells.map(c=>`<td>${md(c)}</td>`).join('') + '</tr>';
      });
      html += `<table><thead><tr>${th}</tr></thead><tbody>${tbody}</tbody></table>`;
      tableRows = []; inTable = false;
    };

    const flushUl = () => { if (inUl) { html += '</ul>'; inUl = false; } };

    lines.forEach(line => {
      const trimmed = line.trim();

      // Tabelle
      if (trimmed.startsWith('|')) {
        flushUl();
        inTable = true;
        tableRows.push(trimmed);
        return;
      } else if (inTable) {
        flushTable();
      }

      // Leerzeile
      if (!trimmed) { flushUl(); html += '<div class="spacer"></div>'; return; }

      // Separator ---
      if (/^---+$/.test(trimmed)) { flushUl(); html += '<hr>'; return; }

      // Überschriften
      if (/^#{1,3} /.test(trimmed)) {
        flushUl();
        html += `<h3>${md(trimmed.replace(/^#+\s*/,''))}</h3>`;
        return;
      }

      // Blockquote / Fazit
      if (trimmed.startsWith('> ')) {
        flushUl();
        html += `<div class="fazit">${md(trimmed.slice(2))}</div>`;
        return;
      }

      // Liste
      if (/^[•\-\*] /.test(trimmed)) {
        if (!inUl) { html += '<ul>'; inUl = true; }
        html += `<li>${md(trimmed.replace(/^[•\-\*] /,''))}</li>`;
        return;
      }

      // Nummerierte Liste
      if (/^\d+\. /.test(trimmed)) {
        flushUl();
        html += `<p><strong>${trimmed.match(/^\d+/)[0]}.</strong> ${md(trimmed.replace(/^\d+\.\s*/,''))}</p>`;
        return;
      }

      flushUl();
      html += `<p>${md(trimmed)}</p>`;
    });

    flushUl();
    if (inTable) flushTable();
    return html;
  }

  function md(s) {
    // Erst HTML escapen, dann nur erlaubtes Markdown wieder als Tags zulassen
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
  }

  function closeAI() {
    document.getElementById('ai-panel').classList.remove('open');
    document.getElementById('panels').classList.remove('ai-open');
  }
</script>
</body>
</html>
